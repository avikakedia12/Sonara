# Render Blueprint -- https://render.com/docs/blueprint-spec
#
# Two services: a long-running Python web service for the FastAPI + ML
# backend (NOT serverless -- basic-pitch's model load and audio
# transcription can take a minute or more, which would blow past a
# serverless function's execution limit), and a static site for the Vite
# frontend build.
#
# The two envVars below hardcode each other's actual onrender.com URL.
# "sonara-backend" was already taken, so Render assigned
# sonara-backend-frz0.onrender.com instead -- confirmed via `render services`
# and by checking what's actually baked into the deployed frontend bundle.
#
# The backend's Python version is pinned via a top-level .python-version
# file (3.11), not a PYTHON_VERSION env var here -- the env var requires a
# fully-qualified version and, in practice, wasn't reliably honored even
# when correctly formatted. .python-version is Render's other documented
# mechanism (https://render.com/docs/python-version) and doesn't have
# either issue.
services:
  - type: web
    name: sonara-backend
    runtime: python
    plan: free
    # basic-pitch is installed first with --no-deps, deliberately skipping
    # its normal (Linux + Python>=3.11) tensorflow<2.15.1 dependency --
    # see requirements.txt's comment above tflite-runtime for why: that
    # tensorflow pulls in a numpy-2.0-incompatible ABI and a 400MB+ runtime
    # that blew past this plan's memory limit. requirements.txt then
    # installs basic-pitch's other real dependencies (numpy, librosa, etc.)
    # plus tflite-runtime as the lightweight inference backend instead.
    buildCommand: pip install --no-deps basic-pitch==0.4.0 && pip install -r requirements.txt
    startCommand: uvicorn api:app --app-dir scripts --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://sonara-frontend.onrender.com

  - type: web
    name: sonara-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://sonara-backend-frz0.onrender.com
      # Vite 8 requires Node ^20.19.0 || >=22.12.0 -- pinned explicitly since
      # Render's default Node version for static sites isn't guaranteed to
      # satisfy that.
      - key: NODE_VERSION
        value: "22"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
